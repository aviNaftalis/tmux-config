# ─── General ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc,alacritty:Tc,wezterm:Tc"
set -g mouse on
set -g history-limit 100000
set -g escape-time 0          # no delay on ESC (vim-friendly)
set -g focus-events on
set -g renumber-windows on    # keep window numbers contiguous
set -g base-index 1           # windows start at 1
setw -g pane-base-index 1     # panes start at 1
setw -g mode-keys vi          # vi keys in copy-mode
set -g status-keys emacs      # emacs keys in command prompt
set -g set-clipboard on
set -g allow-passthrough on
setw -g monitor-activity on
set -g visual-activity off
set -g display-time 2000
set -g display-panes-time 2000

# ─── Prefix ──────────────────────────────────────────────────────────────────
# Primary: C-Space (easy to hit, no vim/readline clash). Secondary: C-b (default).
set -g prefix  C-Space
set -g prefix2 C-b
bind C-Space send-prefix
bind C-b     send-prefix -2
bind Space last-window        # prefix Space => last window

# ─── Reload config ───────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "  tmux.conf reloaded"

# ─── Splits (intuitive: | for vertical, - for horizontal, keep cwd) ──────────
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ─── Vim-style pane navigation (prefix h/j/k/l) ──────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation WITHOUT prefix — Alt+hjkl moves between PANES
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim-style pane resizing (prefix H/J/K/L, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Window (tab) navigation ─────────────────────────────────────────────────
# Alt + arrow keys for tabs
bind -n M-Left  previous-window
bind -n M-Right next-window
# Quick jump by number: Alt+1..9
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# Move tabs around: Ctrl+Shift+Left/Right
bind -n C-S-Left  swap-window -t -1 \; previous-window
bind -n C-S-Right swap-window -t +1 \; next-window
# Prefix Tab toggles to last window
bind Tab last-window

# ─── Copy mode (vim-flavoured) ───────────────────────────────────────────────
bind Escape copy-mode
bind p paste-buffer -p

# In copy-mode: v starts selection, V line, C-v rect, y yanks
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi V   send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy) || (command -v xclip >/dev/null && xclip -selection clipboard) || (command -v clip.exe >/dev/null && clip.exe) || cat >/dev/null"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy) || (command -v xclip >/dev/null && xclip -selection clipboard) || (command -v clip.exe >/dev/null && clip.exe) || cat >/dev/null"
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi C-b send-keys -X page-up
bind -T copy-mode-vi C-f send-keys -X page-down
bind -T copy-mode-vi g   send-keys -X history-top
bind -T copy-mode-vi G   send-keys -X history-bottom
bind -T copy-mode-vi H   send-keys -X start-of-line
bind -T copy-mode-vi L   send-keys -X end-of-line
bind -T copy-mode-vi /   send-keys -X search-forward
bind -T copy-mode-vi ?   send-keys -X search-backward
bind -T copy-mode-vi n   send-keys -X search-again
bind -T copy-mode-vi N   send-keys -X search-reverse
bind -T copy-mode-vi Escape send-keys -X cancel

# ─── Mouse copy: drag to select, release copies to system clipboard ──────────
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy) || (command -v xclip >/dev/null && xclip -selection clipboard) || (command -v clip.exe >/dev/null && clip.exe) || cat >/dev/null"
# Right-click pastes from system clipboard (like modern terminals)
bind -n MouseDown3Pane run "tmux set-buffer -- \"$( (command -v wl-paste >/dev/null && wl-paste) || (command -v xclip >/dev/null && xclip -selection clipboard -o) || (command -v powershell.exe >/dev/null && powershell.exe -NoProfile -Command Get-Clipboard) || tmux show-buffer )\"; tmux paste-buffer -p"
bind -T copy-mode-vi MouseDown3Pane run "tmux send-keys -X cancel; tmux set-buffer -- \"$( (command -v wl-paste >/dev/null && wl-paste) || (command -v xclip >/dev/null && xclip -selection clipboard -o) || (command -v powershell.exe >/dev/null && powershell.exe -NoProfile -Command Get-Clipboard) || tmux show-buffer )\"; tmux paste-buffer -p"
# Double-click word, triple-click line
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-pipe-no-clear "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy) || (command -v xclip >/dev/null && xclip -selection clipboard) || (command -v clip.exe >/dev/null && clip.exe) || cat >/dev/null"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-pipe-no-clear "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy) || (command -v xclip >/dev/null && xclip -selection clipboard) || (command -v clip.exe >/dev/null && clip.exe) || cat >/dev/null"

# ─── Ctrl+C / Ctrl+V / Shift+Insert ──────────────────────────────────────────
# Ctrl+C in copy-mode copies selection
bind -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "tmux save-buffer - | (command -v wl-copy >/dev/null && wl-copy) || (command -v xclip >/dev/null && xclip -selection clipboard) || (command -v clip.exe >/dev/null && clip.exe) || cat >/dev/null"
# Ctrl+V (no prefix) pastes from system clipboard
bind -n C-V run "tmux set-buffer -- \"$( (command -v wl-paste >/dev/null && wl-paste) || (command -v xclip >/dev/null && xclip -selection clipboard -o) || (command -v powershell.exe >/dev/null && powershell.exe -NoProfile -Command Get-Clipboard) || tmux show-buffer )\"; tmux paste-buffer -p"
# Shift+Insert pastes from system clipboard
bind -n S-Insert run "tmux set-buffer -- \"$( (command -v wl-paste >/dev/null && wl-paste) || (command -v xclip >/dev/null && xclip -selection clipboard -o) || (command -v powershell.exe >/dev/null && powershell.exe -NoProfile -Command Get-Clipboard) || tmux show-buffer )\"; tmux paste-buffer -p"

# ─── Misc niceties ───────────────────────────────────────────────────────────
bind x kill-pane          # no confirm — fast
bind X kill-window
bind z resize-pane -Z     # toggle zoom
bind , command-prompt -I "#W" "rename-window '%%'"
bind \; command-prompt
bind "'" choose-session
# (window list: prefix w — tmux default — shows all windows)
bind R refresh-client
bind C-l send-keys 'C-l' \; clear-history    # prefix Ctrl-l also clears scrollback
bind y setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"

# ─── Help / cheatsheet popups ────────────────────────────────────────────────
# prefix ?  → curated cheatsheet (scrollable, q to close)
unbind ?
bind ? display-popup -E -w 80% -h 80% -T " tmux cheatsheet (q to close) " \
    "less -R ~/.config/tmux/cheatsheet.txt"
# prefix /  → raw list-keys (everything tmux knows about, including defaults)
bind / display-popup -E -w 90% -h 90% -T " all key bindings (q to close) " \
    "tmux list-keys | less"

# ─── Visuals (Tokyo-Night-ish palette) ───────────────────────────────────────
%hidden BG="#1a1b26"
%hidden FG="#c0caf5"
%hidden ACCENT="#7aa2f7"
%hidden GREEN="#9ece6a"
%hidden YELLOW="#e0af68"
%hidden RED="#f7768e"
%hidden MUTED="#565f89"
%hidden DARK="#16161e"

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
# Transparent status bar — lets terminal bg image show through
set -g status-style "bg=default,fg=$FG"

# Left: session name + prefix indicator (lights up when prefix held) + copy-mode flag
set -g status-left-length 60
set -g status-left "#[bg=$ACCENT,fg=$DARK,bold]  #S #[bg=default,fg=$ACCENT] #{?client_prefix,#[bg=$YELLOW#,fg=$DARK#,bold]  PREFIX #[bg=default#,fg=default] ,}#{?pane_in_mode,#[bg=$GREEN#,fg=$DARK#,bold]  COPY #[bg=default#,fg=default] ,}"

# Window list — each tab wrapped with ▏ ▕ separators so names are distinct
setw -g window-status-separator " "
setw -g window-status-format         "#[bg=default,fg=$MUTED]▏#I:#W#{?window_zoomed_flag, , }▕"
setw -g window-status-current-format "#[bg=default,fg=$ACCENT]▏#[bg=$ACCENT,fg=$DARK,bold]#I:#W#{?window_zoomed_flag, , }#[bg=default,fg=$ACCENT]▕"
setw -g window-status-activity-style "fg=$YELLOW,bg=default"
setw -g window-status-bell-style     "fg=$RED,bg=default,bold"

# Right: weather · date+time · host
set -g status-right-length 160
set -g status-right "#[fg=$FG]#(~/.config/tmux/scripts/weather.sh) #[fg=$MUTED]·  %a %d %b %H:%M #[fg=$ACCENT]#[bg=$ACCENT,fg=$DARK,bold]  #h "

# Pane borders
set -g pane-border-style        "fg=$MUTED"
set -g pane-active-border-style "fg=$ACCENT"
set -g display-panes-colour     "$MUTED"
set -g display-panes-active-colour "$ACCENT"

# Messages / command prompt / mode
set -g message-style         "bg=$ACCENT,fg=$DARK,bold"
set -g message-command-style "bg=$ACCENT,fg=$DARK,bold"
set -g mode-style            "bg=$ACCENT,fg=$DARK,bold"

# Clock
setw -g clock-mode-colour "$ACCENT"
setw -g clock-mode-style 24
